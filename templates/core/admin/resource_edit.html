{% extends "base.html" %}

{% block title %}稼働時間の編集{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-warning text-dark fw-bold">
                    <h4 class="mb-0">毎月の最大稼働枠の編集</h4>
                </div>
                <div class="card-body p-4">
                    <div class="mb-4 bg-light p-3 rounded">
                        <p class="mb-1"><strong>社員番号:</strong> {{ target_user.employee_number }}</p>
                        <p class="mb-1"><strong>氏名:</strong> {{ target_user.get_full_name }}</p>
                        <p class="mb-0"><strong>対象月:</strong> {{ year_month }}</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="availableHoursInput" class="form-label fw-bold">稼働可能時間 (時間)</label>
                            <input type="number" name="available_hours" id="availableHoursInput" 
                                   class="form-control form-control-lg" 
                                   value="{{ resource.available_hours }}" min="0" required>
                            <small class="form-text text-muted">この社員が対象月に稼働できる上限時間を入力してください。</small>
                        </div>

                        <div class="d-flex justify-content-between mt-5">
                            <a href="{% url 'admin_resource_management' %}?month={{ year_month }}" class="btn btn-outline-secondary px-4">キャンセル</a>
                            <button type="submit" class="btn btn-warning px-5 fw-bold">更新する</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
