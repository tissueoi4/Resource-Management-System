{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>新規社員アカウント発行</h2>
    <p class="text-muted">社員番号、名前、初期パスワードを設定してアカウントを発行します。</p>

    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">アカウントを発行する</button>
                    <a href="{% url 'admin_employee_list' %}" class="btn btn-secondary ms-2">キャンセル</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
