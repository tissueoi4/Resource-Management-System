{% extends "base.html" %}

{% block title %}権限設定変更{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">社員番号 {{ object.employee_number }} の権限変更</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">割り当てるロール</label>
                            {{ form.role }}
                        </div>
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'admin_employee_list' %}" class="btn btn-outline-secondary">戻る</a>
                            <button type="submit" class="btn btn-primary">権限を確定する</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
