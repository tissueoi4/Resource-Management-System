{% extends "base.html" %}

{% block title %}ログイン - リソース管理システム{% endblock title %}

{% block content %}
    <br>
    <div class="container">
        <h2>システムにログイン</h2>
        <br>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">ログイン</button>
        </form>
        
        <hr>
        <p>アカウントをお持ちでないですか？</p>
        <a href="{% url 'signup' %}" class="btn btn-secondary">新規登録はこちら</a>
    </div>
{% endblock content %}
