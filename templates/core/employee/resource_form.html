{% extends "base.html" %}

{% block title %}工数入力 - リソース管理システム{% endblock %}

{% block content %}
<div class="container py-5">
    
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="card border-0 shadow-sm rounded-4">
                
                <div class="card-body p-4 p-md-5">
                    
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                        <span class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 40px; height: 40px; font-size: 1.2rem;">
                            🕒
                        </span>
                        <h4 class="fw-bold mb-0" style="color: #111827; letter-spacing: -0.02em;">
                            今月の稼働枠を設定
                        </h4>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            {{ form.as_p }}
                        </div>

                        <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                            <a href="{% url 'employee_dashboard' %}" class="btn btn-light border rounded-pill px-4 fw-semibold text-secondary">
                                キャンセル
                            </a>
                            <button type="submit" class="btn btn-dark rounded-pill px-4 fw-semibold shadow-sm">
                                更新する
                            </button>
                        </div>
                    </form>
                    
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
