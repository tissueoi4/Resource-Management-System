{% extends "base.html" %}

{% block title %}社員用ダッシュボード{% endblock title %}

{% block content %}
<div class="container py-5">

    <div class="mb-5 pb-3 border-bottom">
        <h3 class="mb-2">一般社員ダッシュボード</h3>
        <p class="text-secondary mb-0 small">
            ようこそ、{{ user.get_full_name }}さん。
        </p>
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-4">
        
        <div class="col">
            <div class="card h-100 border-0 shadow-sm rounded-4 p-2">
                <!-- カードの内側（高さを揃えるバネの役割） -->
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">🕒 稼働可能時間の設定</h5>
                    <p class="card-text text-muted small flex-grow-1">月の最大稼働枠を登録します。</p>
                    <a href="{% url 'resource_add' %}" class="btn btn-primary w-100 mt-auto">稼働枠を設定する</a>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 border-0 shadow-sm rounded-4 p-2">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">📝 プロジェクト別工数の登録</h5>
                    <p class="card-text text-muted small flex-grow-1">各プロジェクトへの配分時間を登録します。</p>
                    <a href="{% url 'task_effort_create' %}" class="btn btn-success w-100 mt-auto">プロジェクトの工数を登録する</a>
                </div>
            </div>
        </div>

    </div>

</div>
{% endblock content %}
