{% extends "base.html" %}

{% block title %}予定工数登録{% endblock %}

{% block content %}
<div class="container py-5">
    
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="card border-0 shadow-sm rounded-4">
                
                <div class="card-body p-4 p-md-5">
                    
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                        <span class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 40px; height: 40px; font-size: 1.2rem;">
                            📝
                        </span>
                        <h4 class="fw-bold mb-0" style="color: #111827; letter-spacing: -0.02em;">
                            プロジェクト予定工数登録
                        </h4>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            {% for field in form %}
                                <div class="mb-3">
                                    <label class="form-label fw-semibold text-secondary small">{{ field.label }}</label>
                                    {{ field }}
                                    {% if field.errors %}
                                        <div class="text-danger mt-1 small">
                                            {{ field.errors|striptags }}
                                        </div>
                                    {% endif %}
                                </div>
                            {% endfor %}
                        </div>

                        <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                            <a href="{% url 'employee_dashboard' %}" class="btn btn-light border rounded-pill px-4 fw-semibold text-secondary">
                                キャンセル
                            </a>
                            <button type="submit" class="btn btn-dark rounded-pill px-4 fw-semibold shadow-sm">
                                登録・更新する
                            </button>
                        </div>
                    </form>
                    
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
